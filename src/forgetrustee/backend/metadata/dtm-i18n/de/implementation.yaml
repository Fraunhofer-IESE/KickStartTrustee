moduleId: implementation
label: Datentreuhandmodell Data
tooltip: Technische Implementierung
heading: Implementierung
menuPoint: Implementierung
helpText: Beschreibt technische Aspekte und den Datenlebenszyklus.
examples: []
hints:
  - name: implementationGeneralHint
    text: Alle Angaben zu den Implementierungstechniken sind optional, sollten für ein vollständiges Modell aber ausgefüllt werden.
sections:
  dataTrusteeType:
    heading: Art des Datentreuhand
    helpText: >
      Der Datengeber entscheidet fallbezogen, typischerweise per Einwilligung oder Freigabe, ob und in welchem Umfang eine Weitergabe erfolgt; der Datentreuhänder setzt diese Entscheidungen technisch und organisatorisch durch und vermittelt den Zugriff.
      <ul>
        <li>
          <strong>Zugangstreuhand:</strong> Der Datengeber entscheidet fallbezogen, typischerweise per Einwilligung oder Freigabe, ob und in welchem Umfang eine Weitergabe erfolgt; der Datentreuhänder setzt diese Entscheidungen technisch und organisatorisch durch und vermittelt den Zugriff.
        </li>
        <li>
          <strong>Verwaltungstreuhand:</strong> Der Datentreuhänder entscheidet regel- und policybasiert im Rahmen gesetzlicher und vertraglicher Vorgaben, ob und wie Daten verwaltet oder weitergegeben werden; individuelle Einwilligungen sind dabei nicht der primäre Steuerungsmechanismus.
        </li>
        <li>
          <strong>Mehrwerttreuhand: </strong> Der Datentreuhänder erbringt zusätzlich wertschöpfende Leistungen (z. B. Aufbereitung, Analyse, Schutzmaßnahmen); die Governance folgt je nach Ausgestaltung entweder dem Zugangsprinzip (Entscheidung bei des Datengebers) oder dem Verwaltungsprinzip (regelbasierte Entscheidung durch den Datentreuhänder), in selbstbestimmter oder fremdbestimmter Variante.
        </li>
      </ul>
      <br/><br/>Weitere Informationen erhalten Sie unter dem folgenden <a target=\"_blank\" href="https://fraunhofer-iese.github.io/KickStartTrustee/Grundlagen%20und%20Einf%C3%BChrung/Rechtliche%20Anforderungen%20und%20Einsch%C3%A4tzungen/Baukastenmodell/">Link</a>.
    examples: []
    fields:
      dataTrusteeCategory:
        label: Welche spezifische Oberklasse hat die Datentreuhand
        examples: []
        options:
          - value: ACCESS_DATA_TRUSTEE
            label: Zugangstreuhand
          - value: ADMINISTRATIVE_DATA_TRUSTEE
            label: Verwaltungstreuhand
#          - value: VALUE_ADDED_DATA_TRUSTEE
#            label: Mehrwerttreuhand
          - value: SELF_MANAGED_VALUE_ADDED_DATA_TRUSTEE
            label: Selbstbestimmte Mehrwertreuhand
          - value: EXTERNALLY_CONTROLLED_VALUE_ADDED_DATA_TRUSTEE
            label: Fremdbestimmte Mehrwerttreuhand
          - value: AMBIGUOUS
            label: Unklar
#      addedValueTrusteeType:
#        label: Welche Art der Mehrwerttreuhand liegt vor?
#        examples: []
#        options:
#          - value: SELF_MANAGED_VALUE_ADDED_DATA_TRUSTEE
#            label: Selbstbestimmt
#          - value: EXTERNALLY_CONTROLLED_VALUE_ADDED_DATA_TRUSTEE
#            label: Fremdbestimmt
